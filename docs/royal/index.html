<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Jhon &amp; Jiny — A Royal Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Pinyon+Script&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  /* ============ DESIGN SYSTEM ============ */
  :root {
    /* Royal palette — aubergine, gold, cream, plum */
    --bg-deep:    #1d1020;   /* deepest */
    --bg:         #2b1a2e;   /* base aubergine */
    --bg-soft:    #3a2440;
    --plum:       #5c2a4d;
    --plum-soft:  #743558;
    --gold:       #c9a961;
    --gold-warm:  #d8bc78;
    --gold-soft:  #8c7239;
    --cream:      #f2e3d5;
    --cream-soft: #e3d2bf;
    --ink:        #1a0e1c;
    --line:       rgba(201,169,97,0.35);
    --line-soft:  rgba(201,169,97,0.18);

    /* Type */
    --f-serif:  "Cormorant Garamond", "EB Garamond", Georgia, serif;
    --f-script: "Pinyon Script", "Apple Chancery", cursive;
    --f-sans:   "Inter", system-ui, -apple-system, sans-serif;

    /* Scale (mobile-first) */
    --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
    --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px;

    --max-w: 440px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  html { background: #0a050c; }
  body {
    font-family: var(--f-serif);
    color: var(--cream);
    background:
      radial-gradient(120% 80% at 50% 0%, #3a2240 0%, var(--bg) 38%, var(--bg-deep) 100%);
    min-height: 100dvh;
    overflow-x: hidden;
    line-height: 1.5;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* The whole site lives inside a mobile-width column, centered on larger screens */
  #app-frame {
    max-width: var(--max-w);
    margin: 0 auto;
    position: relative;
    background:
      radial-gradient(120% 60% at 50% 0%, #3a2240 0%, var(--bg) 40%, var(--bg-deep) 100%);
    box-shadow:
      0 0 0 1px rgba(201,169,97,0.08),
      0 40px 80px -20px rgba(0,0,0,0.55),
      0 0 120px rgba(92,42,77,0.25);
    overflow: hidden;
  }

  /* paper grain */
  #app-frame::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(201,169,97,0.04) 0, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(92,42,77,0.18) 0, transparent 50%);
    pointer-events: none; z-index: 1;
    mix-blend-mode: screen;
  }

  /* ============ TYPE ============ */
  h1, h2, h3, h4 { margin: 0; font-weight: 400; }
  .display {
    font-family: var(--f-serif);
    font-weight: 300;
    letter-spacing: 0.01em;
    line-height: 1.05;
  }
  .script {
    font-family: var(--f-script);
    font-weight: 400;
    line-height: 1.25;
    padding: 0.08em 0 0.15em;
  }
  .eyebrow {
    font-family: var(--f-sans);
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
  }
  .body {
    font-family: var(--f-serif);
    font-size: 16px;
    line-height: 1.6;
    color: var(--cream-soft);
  }
  .meta {
    font-family: var(--f-sans);
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-warm);
  }

  /* Gold shimmer text */
  .shimmer {
    background: linear-gradient(
      100deg,
      var(--gold) 0%,
      var(--gold) 35%,
      #fff3c4 48%,
      #fff8d8 52%,
      var(--gold) 65%,
      var(--gold) 100%
    );
    background-size: 250% 100%;
    background-position: 100% 50%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shimmer 4.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 100% 50%; }
    50%      { background-position: 0% 50%; }
  }

  /* ============ SECTIONS ============ */
  section {
    position: relative;
    padding: var(--s-8) var(--s-5);
    z-index: 2;
  }
  section + section {
    border-top: 1px solid var(--line-soft);
  }
  .section-eyebrow {
    text-align: center;
    margin-bottom: var(--s-3);
  }
  .section-title {
    text-align: center;
    font-family: var(--f-serif);
    font-weight: 300;
    font-size: 38px;
    line-height: 1.1;
    color: var(--cream);
    margin-bottom: var(--s-2);
  }
  .section-title em {
    font-family: var(--f-script);
    font-style: normal;
    color: var(--gold);
    font-size: 1.15em;
    line-height: 1.1;
    display: inline-block;
    padding: 0.05em 0.05em 0.18em;
    transform: translateY(0.08em);
  }
  .section-rule {
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    margin: var(--s-4) auto var(--s-6);
    color: var(--gold);
  }
  .section-rule .line {
    width: 40px; height: 1px; background: currentColor; opacity: 0.6;
  }
  .section-rule .dot {
    width: 6px; height: 6px; border: 1px solid currentColor; transform: rotate(45deg);
  }

  /* ============ REVEAL ANIMATION ============ */
  .reveal { opacity: 0; transform: translateY(28px); transition: opacity 1.1s cubic-bezier(.2,.7,.2,1), transform 1.1s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal[data-delay="1"] { transition-delay: .08s; }
  .reveal[data-delay="2"] { transition-delay: .18s; }
  .reveal[data-delay="3"] { transition-delay: .30s; }
  .reveal[data-delay="4"] { transition-delay: .42s; }
  .reveal[data-delay="5"] { transition-delay: .54s; }

  .reveal-draw path,
  .reveal-draw line,
  .reveal-draw circle,
  .reveal-draw polyline {
    stroke-dasharray: var(--len, 1000);
    stroke-dashoffset: var(--len, 1000);
    transition: stroke-dashoffset 2.2s cubic-bezier(.6,.1,.2,1);
  }
  .reveal-draw.in path,
  .reveal-draw.in line,
  .reveal-draw.in circle,
  .reveal-draw.in polyline {
    stroke-dashoffset: 0;
  }

  /* ============ BUTTONS ============ */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    padding: 14px 26px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: var(--f-sans);
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: color .4s ease, border-color .4s ease;
  }
  .btn::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--gold), var(--gold-warm));
    transform: translateY(101%);
    transition: transform .5s cubic-bezier(.2,.7,.2,1);
    z-index: 0;
  }
  .btn:hover { color: var(--ink); }
  .btn:hover::before { transform: translateY(0); }
  .btn > * { position: relative; z-index: 1; }

  .btn-ghost {
    border: 1px solid var(--line);
    color: var(--cream);
  }

  /* ============ CARDS ============ */
  .card {
    background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(0,0,0,0.18));
    border: 1px solid var(--line-soft);
    padding: var(--s-6) var(--s-5);
    position: relative;
  }
  .card::before, .card::after {
    content: ""; position: absolute; width: 14px; height: 14px;
    border: 1px solid var(--gold);
    opacity: 0.7;
  }
  .card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  /* ============ IDLE ANIMATIONS ============ */
  @keyframes float-soft {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }
  @keyframes pulse-soft {
    0%, 100% { opacity: 0.55; }
    50%      { opacity: 1; }
  }
  @keyframes spin-slow {
    from { transform: rotate(0); }
    to   { transform: rotate(360deg); }
  }
  @keyframes drift {
    from { transform: translate(0,0) rotate(0); }
    to   { transform: translate(-6px,-10px) rotate(8deg); }
  }
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(201,169,97,0.0), 0 0 24px rgba(201,169,97,0.1); }
    50%      { box-shadow: 0 0 0 1px rgba(201,169,97,0.35), 0 0 32px rgba(201,169,97,0.3); }
  }
  @keyframes bloom-breath {
    0%, 100% { transform: scale(1) rotate(0deg); }
    50%      { transform: scale(1.08) rotate(2deg); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }
  @keyframes drift-h {
    0%, 100% { transform: translateX(-4px); }
    50%      { transform: translateX(4px); }
  }
  @keyframes ring-expand {
    0%   { transform: scale(0.6); opacity: 0.0; }
    20%  { opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }
  .idle-sway { animation: sway 6s ease-in-out infinite; transform-origin: center bottom; }
  .idle-drift-h { animation: drift-h 7s ease-in-out infinite; }

  .idle-float { animation: float-soft 5s ease-in-out infinite; }
  .idle-pulse { animation: pulse-soft 3.2s ease-in-out infinite; }
  .idle-spin  { animation: spin-slow 60s linear infinite; }

  /* ============ PETALS / SPARKLES ============ */
  .petal-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    overflow: hidden;
  }
  .petal {
    position: absolute;
    will-change: transform, opacity;
    opacity: 0;
  }

  /* ============ SCROLL ============ */
  html { scroll-behavior: smooth; }
  ::selection { background: var(--gold); color: var(--ink); }

  /* ============ HIDE UNTIL ENVELOPE OPEN ============ */
  body.locked { overflow: hidden; height: 100dvh; }
  /* No filter/blur — animating filter is jank-prone. Use opacity + a very small scale,
     hold #app-frame at the same composited layer the whole time. */
  #app-frame { will-change: opacity, transform; transform: translateZ(0); }
  body.locked #app-frame {
    opacity: 0;
    transform: translateY(24px) scale(0.985);
    transition: opacity .9s cubic-bezier(.4,0,.2,1), transform 1.1s cubic-bezier(.2,.7,.2,1);
  }
  body:not(.locked) #app-frame {
    opacity: 1;
    transform: translateY(0) scale(1);
    transition: opacity 1.4s cubic-bezier(.2,.7,.2,1) .15s, transform 1.6s cubic-bezier(.2,.7,.2,1) .15s;
  }

  /* Edit-mode overrides */
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>
<body class="locked">

  <!-- Envelope overlay (cover) -->
  <div id="envelope-root"></div>

  <!-- Main site -->
  <main id="app-frame">
    <div id="site"></div>
  </main>

  <!-- Petal / sparkle layer -->
  <div class="petal-layer" id="petal-layer"></div>

  <!-- Tweaks panel mount -->
  <div id="tweaks-root"></div>

  <!-- Scripts -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ornaments.jsx"></script>
  <script type="text/babel" src="petals.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel" src="envelope.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <style id="__om-edit-overrides"></style>
</body>
